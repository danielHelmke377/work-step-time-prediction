name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  test:
    name: Smoke Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install core dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run smoke tests
        run: pytest tests/ -v --tb=short

      - name: Check import of shared package
        run: |
          python -c "
          from repair_order.config import OUTPUT_TARGETS, KEYWORD_FLAGS
          from repair_order.features import preprocess_positions, build_order_text
          assert len(OUTPUT_TARGETS) == 14
          assert len(KEYWORD_FLAGS) == 17
          print('repair_order package imports OK')
          "
