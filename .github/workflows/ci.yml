name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  test:
    name: Full Pipeline (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install core + dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Check package imports
        run: |
          python -c "
          from repair_order.config import OUTPUT_TARGETS, KEYWORD_FLAGS
          from repair_order.features import preprocess_positions, build_order_text
          from repair_order.pipeline import load_pipeline, predict_order
          assert len(OUTPUT_TARGETS) == 14
          assert len(KEYWORD_FLAGS) == 17
          print('repair_order package imports OK')
          "

      - name: Run smoke tests
        run: pytest -vv --tb=short

      - name: Generate synthetic data
        run: python scripts/generate_synthetic_data.py

      - name: Train on synthetic data
        run: python scripts/train.py --data data/synthetic_orders.json

      - name: Run batch prediction
        run: python scripts/predict.py --batch 5
